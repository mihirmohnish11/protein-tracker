<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --green: #00e676;
  --green-dim: #00e67622;
  --amber: #ffab40;
  --amber-dim: #ffab4022;
  --red: #ff5252;
  --blue: #448aff;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 430px; margin: 0 auto; }
.header { padding: 52px 20px 16px; background: var(--bg); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.date-label { font-size: 12px; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.reset-btn { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; cursor: pointer; }
.ring-row { display: flex; align-items: center; gap: 16px; }
.ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
.ring-fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease, stroke 0.3s; }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-pct { font-size: 16px; font-weight: 800; color: var(--text); line-height: 1; }
.ring-pct-label { font-size: 9px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }
.stats-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; }
.stat-label { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.stat-val { font-size: 18px; font-weight: 700; }
.stat-val span { font-size: 11px; font-weight: 400; color: var(--text2); }
.stat-val.green { color: var(--green); }
.stat-val.amber { color: var(--amber); }
.target-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 3px 8px; width: 60px; text-align: center; }
.target-input:focus { outline: none; border-color: var(--green); }
.cal-row { display: flex; gap: 12px; margin-top: 10px; }
.cal-stat { flex: 1; background: var(--surface); border-radius: var(--radius-sm); padding: 8px 10px; }
.cal-label { font-size: 10px; color: var(--text2); font-family: 'DM Mono', monospace; margin-bottom: 2px; }
.cal-val { font-size: 15px; font-weight: 700; color: var(--amber); }
.cal-val span { font-size: 10px; font-weight: 400; color: var(--text2); }
.tabs { display: flex; padding: 0 20px; gap: 4px; margin-bottom: 4px; }
.tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 8px; cursor: pointer; color: var(--text2); border: none; background: none; transition: all 0.2s; font-family: 'Syne', sans-serif; }
.tab.active { background: var(--surface2); color: var(--text); }
.scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { display: none; }
.meal-section { margin-bottom: 16px; }
.meal-section-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.meal-section-name { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); }
.meal-section-stats { display: flex; gap: 10px; }
.meal-p { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--green); }
.meal-c { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--amber); }
.log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 6px; }
.log-item-name { font-size: 14px; font-weight: 600; color: var(--text); }
.log-item-time { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.log-item-right { display: flex; align-items: center; gap: 10px; }
.log-item-nums { text-align: right; }
.log-p { font-size: 14px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
.log-c { font-size: 11px; color: var(--amber); font-family: 'DM Mono', monospace; }
.del-btn { width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); border: none; color: var(--text3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.del-btn:active { background: rgba(255,82,82,0.2); color: var(--red); }
.empty-meal { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 8px 0; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }
.meal-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.meal-chip { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-family: 'Syne', sans-serif; }
.meal-chip.selected { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.food-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; transition: all 0.15s; }
.food-card:active { transform: scale(0.97); background: var(--surface2); }
.food-card-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
.food-card-desc { font-size: 10px; color: var(--text2); line-height: 1.4; margin-bottom: 8px; }
.food-card-bottom { display: flex; align-items: baseline; gap: 8px; }
.food-card-p { font-size: 17px; font-weight: 800; color: var(--green); font-family: 'DM Mono', monospace; }
.food-card-pg { font-size: 10px; color: var(--text2); }
.food-card-c { font-size: 12px; font-weight: 600; color: var(--amber); font-family: 'DM Mono', monospace; }
.food-card-cg { font-size: 10px; color: var(--text3); }
.custom-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.custom-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 10px 12px; margin-bottom: 10px; }
.custom-input:focus { outline: none; border-color: var(--green); }
.custom-input::placeholder { color: var(--text3); }
.input-row { display: flex; gap: 8px; margin-bottom: 10px; }
.input-row .custom-input { margin-bottom: 0; }
.add-btn { width: 100%; padding: 13px; background: var(--green); color: #000; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }
.add-btn:active { opacity: 0.8; transform: scale(0.99); }
.chart-wrap { padding: 12px 0; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 160px; margin-bottom: 8px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.4s ease; }
.bar-val { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text2); }
.bar-day { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text3); margin-top: 4px; }
.chart-legend { display: flex; gap: 16px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
.week-stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
.week-stat { flex: 1; background: var(--surface); border-radius: var(--radius-sm); padding: 10px 12px; }
.week-stat-label { font-size: 10px; color: var(--text2); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.week-stat-val { font-size: 18px; font-weight: 800; }
.no-data { text-align: center; padding: 40px 0; color: var(--text3); font-size: 13px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="date-label" id="date-label"></div>
      <button class="reset-btn" onclick="resetDay()">Reset day</button>
    </div>
    <div class="ring-row">
      <div class="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="34"/>
          <circle class="ring-fill" id="ring" cx="40" cy="40" r="34" stroke-dasharray="213.63" stroke-dashoffset="213.63"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-pct-label">protein</div>
        </div>
      </div>
      <div class="stats-col">
        <div class="stat-row">
          <span class="stat-label">eaten</span>
          <span class="stat-val green" id="eaten-val">0<span>g</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">remaining</span>
          <span class="stat-val" id="rem-val">130<span>g</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">target</span>
          <input class="target-input" type="number" id="target-input" value="130" min="50" max="300"/>
        </div>
      </div>
    </div>
    <div class="cal-row">
      <div class="cal-stat">
        <div class="cal-label">calories today</div>
        <div class="cal-val" id="cal-val">0<span> kcal</span></div>
      </div>
      <div class="cal-stat">
        <div class="cal-label">cal target</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
          <input class="target-input" type="number" id="cal-target-input" value="2000" min="500" max="5000" style="width:70px;color:var(--amber);border-color:var(--amber)22;"/>
          <span style="font-size:10px;color:var(--text2);font-family:'DM Mono',monospace;">kcal</span>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">Today</button>
    <button class="tab" onclick="switchTab('add')">+ Add</button>
    <button class="tab" onclick="switchTab('protein')">Protein</button>
    <button class="tab" onclick="switchTab('calories')">Calories</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div class="scroll" id="scroll-area">
    <div id="tab-today"></div>
    <div id="tab-add" style="display:none;"></div>
    <div id="tab-protein" style="display:none;"></div>
    <div id="tab-calories" style="display:none;"></div>
    <div id="tab-history" style="display:none;"></div>
  </div>
</div>

<script>
const MEALS = ['Breakfast','Mid-morning','Lunch','Evening snack','Dinner'];
const FOODS = [
  {name:'Smoothie + Whey', desc:'Oats 40g, milk 250ml, banana, 1 scoop whey', p:39, c:420},
  {name:'Whey scoop (1)', desc:'Nakpro 1 scoop ~33g powder', p:24, c:120},
  {name:'Paneer 150g', desc:'Raw / in gravy', p:27, c:375},
  {name:'Paneer 200g', desc:'Raw / grated', p:36, c:500},
  {name:'3 Rotis', desc:'Wheat roti', p:9, c:240},
  {name:'2 Rotis', desc:'Wheat roti', p:6, c:160},
  {name:'Dal (1 bowl)', desc:'Cooked ~200ml', p:9, c:150},
  {name:'Dahlia bowl', desc:'40g dahlia + vegetables', p:5, c:160},
  {name:'Soya chunks 50g', desc:'Dry weight, boiled', p:26, c:175},
  {name:'Egg white (1)', desc:'Boiled', p:4, c:17},
  {name:'Whole egg (1)', desc:'Boiled', p:6, c:70},
  {name:'Greek yogurt 200g', desc:'Plain, unsweetened', p:20, c:120},
  {name:'Milk 250ml', desc:'Full fat', p:8, c:150},
  {name:'Banana', desc:'1 medium', p:1, c:90},
  {name:'Oats 40g', desc:'Dry rolled oats', p:6, c:150},
  {name:'Rajma (1 bowl)', desc:'Cooked ~200ml', p:13, c:180},
  {name:'Chole (1 bowl)', desc:'Cooked ~200ml', p:15, c:200},
  {name:'Paneer gravy', desc:'Office portion ~150g paneer', p:27, c:420},
  {name:'Chicken wings 6pc', desc:'Fried, KFC style', p:30, c:500},
  {name:'Tofu 100g', desc:'Firm tofu', p:9, c:80},
];

const todayKey = () => new Date().toISOString().slice(0,10);
let target = parseInt(localStorage.getItem('pt_target') || '130');
let calTarget = parseInt(localStorage.getItem('pt_cal_target') || '2000');
let selectedMeal = 'Breakfast';

function getData() { try { return JSON.parse(localStorage.getItem('pt_data') || '{}'); } catch(e) { return {}; } }
function saveData(d) { localStorage.setItem('pt_data', JSON.stringify(d)); }
function todayLogs() { const d = getData(); return d[todayKey()] || []; }
function saveTodayLogs(logs) { const d = getData(); d[todayKey()] = logs; saveData(d); }

function addLog(name, protein, cal, meal) {
  const logs = todayLogs();
  logs.push({ name, protein: Math.round(protein), cal: cal ? Math.round(cal) : null, meal, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
  saveTodayLogs(logs);
  renderAll();
  switchTab('today');
}

function removeLog(i) { const logs = todayLogs(); logs.splice(i, 1); saveTodayLogs(logs); renderAll(); }
function resetDay() { if (!confirm('Reset today?')) return; const d = getData(); d[todayKey()] = []; saveData(d); renderAll(); }

function renderHeader() {
  const logs = todayLogs();
  const total = logs.reduce((s,l) => s + l.protein, 0);
  const totalCal = logs.reduce((s,l) => s + (l.cal || 0), 0);
  const rem = Math.max(0, target - total);
  const pct = Math.min(100, Math.round(total / target * 100));
  const circ = 213.63;
  document.getElementById('ring-pct').textContent = pct + '%';
  const ring = document.getElementById('ring');
  ring.style.strokeDashoffset = circ - (circ * pct / 100);
  ring.style.stroke = pct >= 100 ? '#00e676' : pct >= 70 ? '#ffab40' : '#448aff';
  document.getElementById('eaten-val').innerHTML = total + '<span>g</span>';
  document.getElementById('eaten-val').className = 'stat-val ' + (pct >= 100 ? 'green' : pct >= 70 ? 'amber' : '');
  document.getElementById('rem-val').innerHTML = rem + '<span>g</span>';
  document.getElementById('cal-val').innerHTML = totalCal + '<span> kcal</span>';
  const now = new Date();
  document.getElementById('date-label').textContent = now.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}

function renderToday() {
  const logs = todayLogs();
  const el = document.getElementById('tab-today');
  if (logs.length === 0) { el.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3);font-family:\'DM Mono\',monospace;font-size:13px;">No meals logged yet<br/>Tap + Add to start</div>'; return; }
  let html = '';
  MEALS.forEach(meal => {
    const items = logs.map((l,i) => ({...l, idx:i})).filter(l => l.meal === meal);
    const mealP = items.reduce((s,l) => s + l.protein, 0);
    const mealC = items.reduce((s,l) => s + (l.cal || 0), 0);
    html += '<div class="meal-section"><div class="meal-section-header"><span class="meal-section-name">' + meal + '</span><div class="meal-section-stats">';
    if (mealP > 0) html += '<span class="meal-p">' + mealP + 'g</span>';
    if (mealC > 0) html += '<span class="meal-c">' + mealC + 'kcal</span>';
    html += '</div></div>';
    if (items.length === 0) { html += '<div class="empty-meal">— nothing logged</div>'; }
    else {
      items.forEach(l => {
        html += '<div class="log-item"><div class="log-item-left"><div class="log-item-name">' + l.name + '</div><div class="log-item-time">' + l.time + '</div></div><div class="log-item-right"><div class="log-item-nums"><div class="log-p">+' + l.protein + 'g</div>' + (l.cal ? '<div class="log-c">' + l.cal + 'kcal</div>' : '') + '</div><button class="del-btn" onclick="removeLog(' + l.idx + ')">×</button></div></div>';
      });
    }
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderAdd() {
  const el = document.getElementById('tab-add');
  let html = '<div style="padding-top:12px;"></div>';
  html += '<div class="section-label">Add to meal</div>';
  html += '<div class="meal-picker">' + MEALS.map(m => '<div class="meal-chip ' + (m===selectedMeal?'selected':'') + '" onclick="selectMeal(\'' + m + '\')">' + m + '</div>').join('') + '</div>';
  html += '<div class="section-label">Your foods</div>';
  html += '<div class="add-grid">';
  FOODS.forEach(f => {
    html += '<div class="food-card" onclick="addLog(\'' + f.name.replace(/'/g,"\'") + '\',' + f.p + ',' + f.c + ',\'' + selectedMeal + '\')"><div class="food-card-name">' + f.name + '</div><div class="food-card-desc">' + f.desc + '</div><div class="food-card-bottom"><span class="food-card-p">' + f.p + '<span class="food-card-pg">g</span></span><span class="food-card-c">' + f.c + '<span class="food-card-cg">kcal</span></span></div></div>';
  });
  html += '</div>';
  html += '<div class="section-label">Custom entry</div>';
  html += '<div class="custom-card"><input class="custom-input" type="text" id="c-name" placeholder="Food name"/><div class="input-row"><input class="custom-input" type="number" id="c-protein" placeholder="Protein (g)" min="0"/><input class="custom-input" type="number" id="c-cal" placeholder="Calories (optional)" min="0"/></div><button class="add-btn" onclick="addCustom()">Add to log</button></div>';
  el.innerHTML = html;
}

function renderChart(tabId, dataKey, color, unit, targetVal) {
  const el = document.getElementById(tabId);
  const d = getData();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    const key = date.toISOString().slice(0,10);
    const logs = d[key] || [];
    const total = logs.reduce((s,l) => s + (dataKey === 'protein' ? l.protein : (l.cal || 0)), 0);
    days.push({ label: date.toLocaleDateString('en-IN', {weekday:'short'}).slice(0,2), val: total, key });
  }
  const vals = days.map(d => d.val).filter(v => v > 0);
  const avg = vals.length ? Math.round(vals.reduce((a,b) => a+b,0) / vals.length) : 0;
  const max = Math.max(...days.map(d => d.val), targetVal);
  const isToday = (key) => key === todayKey();
  let html = '<div class="chart-wrap">';
  html += '<div class="week-stat-row"><div class="week-stat"><div class="week-stat-label">7-day avg</div><div class="week-stat-val" style="color:' + color + '">' + avg + '<span style="font-size:12px;color:var(--text2);font-weight:400;">' + unit + '</span></div></div><div class="week-stat"><div class="week-stat-label">today</div><div class="week-stat-val" style="color:' + color + '">' + days[6].val + '<span style="font-size:12px;color:var(--text2);font-weight:400;">' + unit + '</span></div></div></div>';
  html += '<div class="bar-chart">';
  days.forEach(day => {
    const pct = max > 0 ? (day.val / max * 100) : 0;
    const barColor = isToday(day.key) ? color : color + '88';
    html += '<div class="bar-col"><div class="bar-val">' + (day.val > 0 ? day.val : '') + '</div><div class="bar" style="height:' + Math.max(pct, day.val > 0 ? 4 : 0) + '%;background:' + barColor + ';"></div><div class="bar-day">' + day.label + '</div></div>';
  });
  html += '</div>';
  html += '<div style="height:1px;background:var(--border);margin:8px 0;"></div>';
  html += '<div style="font-size:11px;color:var(--text3);font-family:\'DM Mono\',monospace;">Target: ' + targetVal + unit + ' daily</div>';
  html += '</div>';
  el.innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('tab-history');
  const d = getData();
  const keys = Object.keys(d).filter(k => (d[k] || []).length > 0).sort().reverse();
  if (keys.length === 0) { el.innerHTML = '<div class="no-data">No history yet.<br/>Check back tomorrow.</div>'; return; }
  let html = '';
  keys.slice(0, 30).forEach(k => {
    const logs = d[k] || [];
    const totalP = logs.reduce((s,l) => s + l.protein, 0);
    const totalC = logs.reduce((s,l) => s + (l.cal || 0), 0);
    const pct = Math.min(100, Math.round(totalP / target * 100));
    const date = new Date(k + 'T00:00:00');
    const label = date.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'short'});
    const isExpanded = expandedDay === k;
    html += '<div class="history-day" style="background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:10px;">';
    html += '<div onclick="toggleDay(\'' + k + '\')" style="cursor:pointer;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
    html += '<span style="font-size:13px;font-weight:700;">' + label + '</span>';
    html += '<div style="display:flex;gap:10px;align-items:center;">';
    html += '<span style="font-size:12px;font-family:\'DM Mono\',monospace;color:var(--green);">' + totalP + 'g</span>';
    if (totalC > 0) html += '<span style="font-size:12px;font-family:\'DM Mono\',monospace;color:var(--amber);">' + totalC + 'kcal</span>';
    html += '<span style="font-size:12px;color:var(--text3);">' + (isExpanded ? '▲' : '▼') + '</span>';
    html += '</div></div>';
    html += '<div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;"><div style="height:100%;border-radius:2px;background:' + (pct>=100?'#00e676':pct>=70?'#ffab40':'#448aff') + ';width:' + pct + '%;"></div></div>';
    html += '</div>';
    if (isExpanded) {
      html += '<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px;">';
      MEALS.forEach(meal => {
        const items = logs.filter(l => l.meal === meal);
        if (items.length === 0) return;
        html += '<div style="margin-bottom:10px;"><div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);margin-bottom:6px;">' + meal + '</div>';
        items.forEach(l => {
          html += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">';
          html += '<span style="font-size:13px;color:var(--text);">' + l.name + '</span>';
          html += '<div style="text-align:right;"><span style="font-size:13px;font-family:\'DM Mono\',monospace;color:var(--green);">' + l.protein + 'g</span>' + (l.cal ? '<span style="font-size:11px;font-family:\'DM Mono\',monospace;color:var(--amber);margin-left:8px;">' + l.cal + 'kcal</span>' : '') + '</div>';
          html += '</div>';
        });
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  el.innerHTML = html;
}

let expandedDay = null;
function toggleDay(key) { expandedDay = expandedDay === key ? null : key; renderHistory(); }
  renderHeader();
  renderToday();
  renderAdd();
  renderChart('tab-protein', 'protein', '#00e676', 'g', target);
  renderChart('tab-calories', 'cal', '#ffab40', 'kcal', calTarget);
  renderHistory();
}

function selectMeal(m) { selectedMeal = m; renderAdd(); }

function switchTab(tab) {
  ['today','add','protein','calories','history'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['today','add','protein','calories','history'][i] === tab);
  });
  document.getElementById('scroll-area').scrollTop = 0;
}

function addCustom() {
  const name = document.getElementById('c-name').value.trim();
  const p = parseFloat(document.getElementById('c-protein').value);
  const c = parseFloat(document.getElementById('c-cal').value);
  if (!name || isNaN(p) || p < 0) return;
  addLog(name, p, isNaN(c) ? null : c, selectedMeal);
  document.getElementById('c-name').value = '';
  document.getElementById('c-protein').value = '';
  document.getElementById('c-cal').value = '';
}

document.getElementById('target-input').addEventListener('change', function() {
  target = Math.max(50, Math.min(300, parseInt(this.value) || 130));
  localStorage.setItem('pt_target', target);
  renderAll();
});

document.getElementById('cal-target-input').addEventListener('change', function() {
  calTarget = Math.max(500, Math.min(5000, parseInt(this.value) || 2000));
  localStorage.setItem('pt_cal_target', calTarget);
  renderAll();
});

renderAll();
</script>
</body>
</html>
