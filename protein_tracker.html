<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Protein Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --green: #00e676;
  --green-dim: #00e67622;
  --amber: #ffab40;
  --amber-dim: #ffab4022;
  --red: #ff5252;
  --red-dim: #ff525222;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 430px; margin: 0 auto; }

/* Header */
.header { padding: 52px 20px 16px; background: var(--bg); }
.header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.date-label { font-size: 12px; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.reset-btn { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; cursor: pointer; }
.reset-btn:active { opacity: 0.6; }

.ring-row { display: flex; align-items: center; gap: 20px; }
.ring-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--surface2); stroke-width: 7; }
.ring-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease, stroke 0.3s; }
.ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-pct { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
.ring-pct-label { font-size: 9px; color: var(--text2); font-family: 'DM Mono', monospace; margin-top: 2px; }

.stats-col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.stat-row { display: flex; justify-content: space-between; align-items: baseline; }
.stat-label { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.stat-val { font-size: 20px; font-weight: 700; }
.stat-val span { font-size: 12px; font-weight: 400; color: var(--text2); }
.stat-val.green { color: var(--green); }
.stat-val.amber { color: var(--amber); }
.stat-val.red { color: var(--red); }

.target-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
.target-label { font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.target-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 4px 8px; width: 60px; text-align: center; }
.target-input:focus { outline: none; border-color: var(--green); }

/* Tab bar */
.tabs { display: flex; padding: 0 20px; gap: 4px; margin-bottom: 4px; }
.tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 8px; cursor: pointer; color: var(--text2); border: none; background: none; transition: all 0.2s; }
.tab.active { background: var(--surface2); color: var(--text); }
.tab:active { opacity: 0.7; }

/* Scroll area */
.scroll { flex: 1; overflow-y: auto; padding: 0 20px 100px; -webkit-overflow-scrolling: touch; }
.scroll::-webkit-scrollbar { display: none; }

/* Meal sections */
.meal-section { margin-bottom: 16px; }
.meal-section-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.meal-section-name { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); }
.meal-section-protein { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--green); }

.log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--surface); border-radius: var(--radius-sm); margin-bottom: 6px; }
.log-item-left { flex: 1; }
.log-item-name { font-size: 14px; font-weight: 600; color: var(--text); }
.log-item-time { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 2px; }
.log-item-right { display: flex; align-items: center; gap: 10px; }
.log-item-p { font-size: 15px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
.del-btn { width: 24px; height: 24px; border-radius: 50%; background: var(--surface2); border: none; color: var(--text3); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.del-btn:active { background: var(--red-dim); color: var(--red); }

.empty-meal { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; padding: 8px 0; }

/* Add tab */
.add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.food-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
.food-card:active { transform: scale(0.97); background: var(--surface2); }
.food-card-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
.food-card-desc { font-size: 10px; color: var(--text2); line-height: 1.4; margin-bottom: 8px; }
.food-card-p { font-size: 18px; font-weight: 800; color: var(--green); font-family: 'DM Mono', monospace; }
.food-card-pg { font-size: 10px; color: var(--text2); }

.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }

.meal-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.meal-chip { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; }
.meal-chip.selected { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.meal-chip:active { opacity: 0.7; }

.custom-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.custom-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; padding: 10px 12px; margin-bottom: 10px; }
.custom-input:focus { outline: none; border-color: var(--green); }
.custom-input::placeholder { color: var(--text3); }
.add-btn { width: 100%; padding: 13px; background: var(--green); color: #000; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; border: none; border-radius: 10px; cursor: pointer; letter-spacing: 0.04em; }
.add-btn:active { opacity: 0.8; transform: scale(0.99); }
.add-btn:disabled { background: var(--surface2); color: var(--text3); cursor: not-allowed; transform: none; }

/* History tab */
.history-day { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.history-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.history-day-date { font-size: 13px; font-weight: 700; }
.history-day-total { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--green); }
.history-bar { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.history-bar-fill { height: 100%; border-radius: 2px; background: var(--green); }

.no-history { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="date-label" id="date-label"></div>
      </div>
      <button class="reset-btn" onclick="resetDay()">Reset day</button>
    </div>
    <div class="ring-row">
      <div class="ring-wrap">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle class="ring-bg" cx="45" cy="45" r="38"/>
          <circle class="ring-fill" id="ring" cx="45" cy="45" r="38" stroke-dasharray="238.76" stroke-dashoffset="238.76"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-pct-label">done</div>
        </div>
      </div>
      <div class="stats-col">
        <div class="stat-row">
          <span class="stat-label">eaten</span>
          <span class="stat-val green" id="eaten-val">0<span>g</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">remaining</span>
          <span class="stat-val" id="rem-val">130<span>g</span></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">target</span>
          <input class="target-input" type="number" id="target-input" value="130" min="50" max="300"/>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">Today</button>
    <button class="tab" onclick="switchTab('add')">+ Add</button>
    <button class="tab" onclick="switchTab('history')">History</button>
  </div>

  <div class="scroll" id="scroll-area">
    <!-- Today tab -->
    <div id="tab-today"></div>
    <!-- Add tab -->
    <div id="tab-add" style="display:none;">
      <div class="section-label" style="margin-top:12px;">Add to meal</div>
      <div class="meal-picker" id="meal-picker"></div>
      <div class="section-label">Your foods</div>
      <div class="add-grid" id="food-grid"></div>
      <div class="section-label">Custom entry</div>
      <div class="custom-card">
        <input class="custom-input" type="text" id="c-name" placeholder="Food name (e.g. Poha)"/>
        <input class="custom-input" type="number" id="c-protein" placeholder="Protein in grams" min="0" max="300"/>
        <button class="add-btn" onclick="addCustom()">Add to log</button>
      </div>
    </div>
    <!-- History tab -->
    <div id="tab-history" style="display:none;"></div>
  </div>
</div>

<script>
const MEALS = ['Breakfast','Mid-morning','Lunch','Evening snack','Dinner'];
const FOODS = [
  {name:'Smoothie + Whey', desc:'Oats 40g, milk 250ml, banana, 1 scoop whey', p:39},
  {name:'Whey scoop (1)', desc:'Nakpro 1 scoop ~33g powder', p:24},
  {name:'Paneer 150g', desc:'Raw / in gravy', p:27},
  {name:'Paneer 200g', desc:'Raw / grated', p:36},
  {name:'3 Rotis', desc:'Wheat roti', p:9},
  {name:'2 Rotis', desc:'Wheat roti', p:6},
  {name:'Dal (1 bowl)', desc:'Cooked ~200ml', p:9},
  {name:'Dahlia bowl', desc:'40g dahlia + vegetables', p:5},
  {name:'Soya chunks 50g', desc:'Dry weight, boiled', p:26},
  {name:'Egg white (1)', desc:'Boiled', p:4},
  {name:'Whole egg (1)', desc:'Boiled', p:6},
  {name:'Greek yogurt 200g', desc:'Plain, unsweetened', p:20},
  {name:'Milk 250ml', desc:'Full fat', p:8},
  {name:'Banana', desc:'1 medium', p:1},
  {name:'Oats 40g', desc:'Dry rolled oats', p:6},
  {name:'Rajma (1 bowl)', desc:'Cooked ~200ml', p:13},
  {name:'Chole (1 bowl)', desc:'Cooked ~200ml', p:15},
  {name:'Paneer gravy', desc:'Office portion ~150g paneer', p:27},
  {name:'Chicken wings 6pc', desc:'Fried, KFC style', p:30},
  {name:'Tofu 100g', desc:'Firm tofu', p:9},
];

const todayKey = () => new Date().toISOString().slice(0,10);
let target = parseInt(localStorage.getItem('pt_target') || '130');
let selectedMeal = 'Breakfast';
let activeTab = 'today';

function getData() {
  try { return JSON.parse(localStorage.getItem('pt_data') || '{}'); } catch(e) { return {}; }
}
function saveData(d) { localStorage.setItem('pt_data', JSON.stringify(d)); }
function todayLogs() { const d = getData(); return d[todayKey()] || []; }
function saveTodayLogs(logs) { const d = getData(); d[todayKey()] = logs; saveData(d); }

function addLog(name, protein, meal) {
  const logs = todayLogs();
  logs.push({ name, protein: Math.round(protein), meal, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
  saveTodayLogs(logs);
  renderAll();
  switchTab('today');
}

function removeLog(i) {
  const logs = todayLogs();
  logs.splice(i, 1);
  saveTodayLogs(logs);
  renderAll();
}

function resetDay() {
  if (!confirm('Reset today\'s log?')) return;
  const d = getData();
  d[todayKey()] = [];
  saveData(d);
  renderAll();
}

function renderHeader() {
  const logs = todayLogs();
  const total = logs.reduce((s,l) => s + l.protein, 0);
  const rem = Math.max(0, target - total);
  const pct = Math.min(100, Math.round(total / target * 100));
  const circ = 238.76;
  const offset = circ - (circ * pct / 100);

  document.getElementById('ring-pct').textContent = pct + '%';
  const ring = document.getElementById('ring');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = pct >= 100 ? '#00e676' : pct >= 70 ? '#ffab40' : '#448aff';

  document.getElementById('eaten-val').innerHTML = total + '<span>g</span>';
  document.getElementById('eaten-val').className = 'stat-val ' + (pct >= 100 ? 'green' : pct >= 70 ? 'amber' : '');
  document.getElementById('rem-val').innerHTML = rem + '<span>g</span>';

  const now = new Date();
  document.getElementById('date-label').textContent = now.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}

function renderToday() {
  const logs = todayLogs();
  const el = document.getElementById('tab-today');
  if (logs.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text3);font-family:\'DM Mono\',monospace;font-size:13px;">No meals logged yet<br/>Tap + Add to start</div>';
    return;
  }
  let html = '';
  MEALS.forEach(meal => {
    const items = logs.map((l,i) => ({...l, idx:i})).filter(l => l.meal === meal);
    const mealTotal = items.reduce((s,l) => s + l.protein, 0);
    html += `<div class="meal-section">
      <div class="meal-section-header">
        <span class="meal-section-name">${meal}</span>
        ${mealTotal > 0 ? `<span class="meal-section-protein">${mealTotal}g</span>` : ''}
      </div>`;
    if (items.length === 0) {
      html += `<div class="empty-meal">— nothing logged</div>`;
    } else {
      items.forEach(l => {
        html += `<div class="log-item">
          <div class="log-item-left">
            <div class="log-item-name">${l.name}</div>
            <div class="log-item-time">${l.time}</div>
          </div>
          <div class="log-item-right">
            <span class="log-item-p">${l.protein}g</span>
            <button class="del-btn" onclick="removeLog(${l.idx})">×</button>
          </div>
        </div>`;
      });
    }
    html += '</div>';
  });
  el.innerHTML = html;
}

function renderAdd() {
  const picker = document.getElementById('meal-picker');
  picker.innerHTML = MEALS.map(m => `<div class="meal-chip ${m===selectedMeal?'selected':''}" onclick="selectMeal('${m}')">${m}</div>`).join('');

  const grid = document.getElementById('food-grid');
  grid.innerHTML = FOODS.map(f => `
    <div class="food-card" onclick="addLog('${f.name.replace(/'/g,"\\'")}', ${f.p}, '${selectedMeal}')">
      <div class="food-card-name">${f.name}</div>
      <div class="food-card-desc">${f.desc}</div>
      <div class="food-card-p">${f.p}<span class="food-card-pg">g</span></div>
    </div>`).join('');
}

function renderHistory() {
  const d = getData();
  const keys = Object.keys(d).filter(k => k !== todayKey()).sort().reverse();
  const el = document.getElementById('tab-history');
  if (keys.length === 0) { el.innerHTML = '<div class="no-history">No history yet.<br/>Check back tomorrow.</div>'; return; }
  el.innerHTML = keys.slice(0,30).map(k => {
    const logs = d[k] || [];
    const total = logs.reduce((s,l) => s + l.protein, 0);
    const pct = Math.min(100, Math.round(total / target * 100));
    const date = new Date(k + 'T00:00:00');
    const label = date.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
    return `<div class="history-day">
      <div class="history-day-header">
        <span class="history-day-date">${label}</span>
        <span class="history-day-total">${total}g / ${target}g</span>
      </div>
      <div class="history-bar"><div class="history-bar-fill" style="width:${pct}%;background:${pct>=100?'#00e676':pct>=70?'#ffab40':'#448aff'}"></div></div>
    </div>`;
  }).join('');
}

function renderAll() { renderHeader(); renderToday(); renderAdd(); renderHistory(); }

function selectMeal(m) { selectedMeal = m; renderAdd(); }

function switchTab(tab) {
  activeTab = tab;
  ['today','add','history'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['today','add','history'][i] === tab);
  });
  document.getElementById('scroll-area').scrollTop = 0;
  if (tab === 'add') renderAdd();
}

function addCustom() {
  const name = document.getElementById('c-name').value.trim();
  const p = parseFloat(document.getElementById('c-protein').value);
  if (!name || isNaN(p) || p < 0) return;
  addLog(name, p, selectedMeal);
  document.getElementById('c-name').value = '';
  document.getElementById('c-protein').value = '';
}

document.getElementById('target-input').addEventListener('change', function() {
  target = Math.max(50, Math.min(300, parseInt(this.value) || 130));
  localStorage.setItem('pt_target', target);
  renderAll();
});

renderAll();
</script>
</body>
</html>
